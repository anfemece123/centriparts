# Supabase project configuration
# Docs: https://supabase.com/docs/reference/cli/config

project_id = "centriparts"

# ── API ───────────────────────────────────────────────────────────────────────
[api]
enabled     = true
port        = 54321
schemas     = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows    = 1000

# ── Auth ──────────────────────────────────────────────────────────────────────
[auth]
enabled = true
# Port for the local Auth server
site_url = "http://localhost:5173"
additional_redirect_urls = ["https://localhost:5173"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

# ── Edge Functions ─────────────────────────────────────────────────────────────
# send-email is invoked from public (unauthenticated) contexts such as the
# checkout page. The new Supabase publishable key (sb_publishable_*) is not a
# JWT, so the default verify_jwt = true would always return 401.
# Security is handled inside the function via the FUNCTION_SECRET header check.
[functions."send-email"]
verify_jwt = false

# ── Database ──────────────────────────────────────────────────────────────────
[db]
port        = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

# ── Storage ───────────────────────────────────────────────────────────────────
[storage]
enabled = true
file_size_limit = "50MiB"
